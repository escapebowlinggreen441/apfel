name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$latest" ]]; then
            echo "Selecting $latest"
            sudo xcode-select -s "$latest/Contents/Developer"
          fi
          echo "Active SDK: $(xcrun --show-sdk-version)"
          echo "Swift: $(swift --version 2>&1 | head -1)"

      - name: Build
        run: swift build -c release

      - name: Unit tests
        run: swift run apfel-tests

      - name: Install Python test dependencies
        run: pip3 install --break-system-packages pytest httpx openai openapi-core pyyaml

      - name: Integration tests
        run: |
          # Note: GitHub-hosted macos-26 runners do not have Apple Intelligence.
          # Tests that require the model will skip gracefully via conftest fixtures.
          # The full 7-suite qualification runs locally via `make preflight` and
          # in the publish-release workflow (which uses a self-hosted runner).

          # Start servers (they start even without model - /health works, inference doesn't)
          .build/release/apfel --serve --port 11434 2>/dev/null &
          .build/release/apfel --serve --port 11435 --mcp mcp/calculator/server.py 2>/dev/null &
          for i in $(seq 1 15); do
            if curl -sf http://localhost:11434/health >/dev/null 2>&1 && \
               curl -sf http://localhost:11435/health >/dev/null 2>&1; then
              echo "Servers ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Run CLI tests (version, help, flags - no model needed)
          # and structural server tests (security, openapi_spec - endpoint shape, not inference)
          python3 -m pytest \
            Tests/integration/cli_e2e_test.py \
            Tests/integration/performance_test.py \
            Tests/integration/security_test.py \
            Tests/integration/openapi_spec_test.py \
            -v --tb=short
          pkill -f "apfel --serve" 2>/dev/null || true
